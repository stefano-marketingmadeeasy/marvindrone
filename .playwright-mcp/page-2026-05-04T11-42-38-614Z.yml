{ cards.forEach((card) => { if (!(card instanceof HTMLElement)) return; card.style.setProperty(\"--card-progress\", \"1\"); }); }; const measureProgress = () => { if (!desktopQuery.matches || reducedMotionQuery.matches) { return 1; } const viewportHeight = window.innerHeight || 1; const rowRect = row.getBoundingClientRect(); const rowCenter = rowRect.top + rowRect.height / 2; const startY = viewportHeight * desktopParallaxStartViewport; const endY = viewportHeight * desktopParallaxEndViewport; return clamp( (startY - rowCenter) / Math.max(startY - endY, 1), 0, 1 ); }; const applyProgress = (progress) => { const progressValue = progress.toFixed(4); cards.forEach((card) => { if (!(card instanceof HTMLElement)) return; card.style.setProperty(\"--card-progress\", progressValue); }); }; const updateCards = () => { if (!desktopQuery.matches || reducedMotionQuery.matches) { setStatic(); return; } applyProgress(measureProgress()); }; const frame = () => { updateCards(); window.requestAnimationFrame(frame); }; window.requestAnimationFrame(frame); window.addEventListener(\"resize\", updateCards); if (typeof desktopQuery.addEventListener === \"function\") { desktopQuery.addEventListener(\"change\", updateCards); } if (typeof reducedMotionQuery.addEventListener === \"function\") { reducedMotionQuery.addEventListener(\"change\", updateCards); } } })();</script><script> (function () { var track = document.querySelector(\"[data-mountains-track]\"); if (!(track instanceof HTMLElement)) return; if (window.matchMedia(\"(max-width: 767px)\").matches) return; if (window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches) return; var imgWidth = 0; var refreshWidth = function () { var img = track.querySelector(\"img\"); imgWidth = img ? img.offsetWidth : 0; }; var animate = function (timestamp) { if (!imgWidth) refreshWidth(); if (imgWidth > 0) { // slow time-based drift (8 px/s) + scroll-driven parallax (0.15 px per scroll px) var timeOffset = (timestamp / 1000) * 8; var scrollOffset = window.scrollY * 0.15; var x = (timeOffset + scrollOffset) % imgWidth; track.style.setProperty(\"--mountains-x\", \"-\" + x.toFixed(2) + \"px\"); } requestAnimationFrame(animate); }; requestAnimationFrame(animate); window.addEventListener(\"resize\", refreshWidth, { passive: true }); })(); </script> <section class=\"relative\"><div class=\"container\"><div data-aos=\"fade-up-sm\" class=\"mx-auto shrink-0 text-center lg:max-w-4xl xl:max-w-5xl\"><h2 class=\"text-h2 text-inherit\">Parco droni e configurazioni operative</h2><div class=\"text-text mx-auto mt-6 max-w-4xl text-base leading-8 text-balance md:mt-8 md:text-lg\"><p>Ogni progetto richiede un equilibrio tra qualità d’immagine, sicurezza operativa, tempi di produzione e costi. Per garantire risultati coerenti con la fotografia e con il piano di ripresa, Marvin Drone impiega un parco droni professionale adatto a lavorazioni differenti: dalla cinematografia ad alta risoluzione alle sequenze dinamiche, fino agli scenari con esigenze tecniche specifiche.</p> </div></div><div class=\"mt-12 grid space-y-10 md:mt-16\" data-aos=\"fade-up-sm\" data-aos-delay=\"400\"><div class=\"border-secondary grid gap-5 border border-black/10 bg-white md:min-h-111 lg:sticky lg:top-[calc(6vh+5rem)] lg:grid-cols-12\"><div class=\"px-8 py-10 md:flex md:flex-col md:justify-center md:px-16 md:py-16 lg:col-span-7 order-1\"><span class=\"text-h2 from-primary font-secondary relative mb-5 inline-block bg-linear-to-b via-white via-90% to-transparent bg-clip-text leading-tight font-bold text-transparent md:text-[4.0625rem]/none\">01</span><h3 class=\"text-h4 mb-8 text-black\">DJI Inspire 3 – cinema drone full-frame</h3><div class=\"prose-styles\"><p>La piattaforma Inspire 3 integra una camera Zenmuse X9-8K Air con sensore full-frame e supporto per registrazioni in 8.1K CinemaDNG a 25 fps o 8K ProRes RAW fino a 75 fps, con ampia gamma dinamica e precisione cromatica utili per produzioni filmiche di alto livello. Oﬀre supporto a RTK, controllo dual-operator e trasmissione video cinema-grade.</p> </div></div><div class=\"relative flex min-h-[260px] items-center justify-center overflow-hidden px-6 pb-6 lg:col-span-5 lg:min-h-full lg:px-10 lg:pb-0 order-2\"><img class=\"relative mx-auto block h-auto max-h-[220px] w-full object-contain lg:absolute lg:inset-0 lg:h-full lg:max-h-none lg:w-full\" src=\"https://cms.marvindrone.com/uploads/inspire3_0c9d568454.webp\" alt=\"inspire3.webp\" width=\"888\" height=\"444\" loading=\"lazy\" decoding=\"async\"></div></div><div class=\"border-secondary grid gap-5 border border-black/10 bg-white md:min-h-111 lg:sticky lg:top-[calc(6vh+5rem)] lg:grid-cols-12\"><div class=\"px-8 py-10 md:flex md:flex-col md:justify-center md:px-16 md:py-16 lg:col-span-7 order-1 lg:order-2\"><span class=\"text-h2 from-primary font-secondary relative mb-5 inline-block bg-linear-to-b via-white via-90% to-transparent bg-clip-text leading-tight font-bold text-transparent md:text-[4.0625rem]/none\">02</span><h3 class=\"text-h4 mb-8 text-black\">DJI Mavic 4 – versatilità professionale</h3><div class=\"prose-styles\"><p>Il Mavic 4 integra un sensore Hasselblad di elevata risoluzione e riprese fino a 6K/60 fps, con prestazioni stabili e qualità di immagine adatta a spot ADV, documentari e produzioni rapide in contesti complessi.</p> </div></div><div class=\"relative flex min-h-[260px] items-center justify-center overflow-hidden px-6 pb-6 lg:col-span-5 lg:min-h-full lg:px-10 lg:pb-0 order-2 lg:order-1\"><img class=\"relative mx-auto block h-auto max-h-[220px] w-full object-contain lg:absolute lg:inset-0 lg:h-full lg:max-h-none lg:w-full\" src=\"https://cms.marvindrone.com/uploads/mavic4_849a4be7cd.webp\" alt=\"mavic4.webp\" width=\"444\" height=\"444\" loading=\"lazy\" decoding=\"async\"></div></div><div class=\"border-secondary grid gap-5 border border-black/10 bg-white md:min-h-111 lg:sticky lg:top-[calc(6vh+5rem)] lg:grid-cols-12\"><div class=\"px-8 py-10 md:flex md:flex-col md:justify-center md:px-16 md:py-16 lg:col-span-7 order-1\"><span class=\"text-h2 from-primary font-secondary relative mb-5 inline-block bg-linear-to-b via-white via-90% to-transparent bg-clip-text leading-tight font-bold text-transparent md:text-[4.0625rem]/none\">03</span><h3 class=\"text-h4 mb-8 text-black\">Drone con sistema di illuminazione</h3><div class=\"prose-styles\"><p>Soluzioni con sistemi di illuminazione integrata consentono di impiegare il drone come fonte luminosa mobile per richieste specifiche, ad esempio simulazioni di luce naturale in notturna o controluce di precisione.</p> </div></div><div class=\"relative flex min-h-[260px] items-center justify-center overflow-hidden px-6 pb-6 lg:col-span-5 lg:min-h-full lg:px-10 lg:pb-0 order-2\"><img class=\"relative mx-auto block h-auto max-h-[220px] w-full object-contain lg:absolute lg:inset-0 lg:h-full lg:max-h-none lg:w-full\" src=\"https://cms.marvindrone.com/uploads/light_f4e69cc19e.webp\" alt=\"light.webp\" width=\"1055\" height=\"725\" loading=\"lazy\" decoding=\"async\"></div></div></div></div></section> <section id=\"compliance\" class=\"relative overflow-hidden bg-black py-16 sm:py-20\" data-astro-cid-5abwlryf><div class=\"pointer-events-none absolute inset-0\" data-astro-cid-5abwlryf><div class=\"absolute -top-24 left-1/2 h-72 w-[48rem] -translate-x-1/2 rounded-full bg-white/5 blur-3xl\" data-astro-cid-5abwlryf></div><div class=\"absolute -right-40 -bottom-32 h-80 w-80 rounded-full bg-white/5 blur-3xl\" data-astro-cid-5abwlryf></div></div><div class=\"container relative z-10\" data-astro-cid-5abwlryf><div class=\"mx-auto max-w-3xl text-center\" data-astro-cid-5abwlryf><p class=\"inline-flex items-center rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs font-medium tracking-wide text-white/80\" data-astro-cid-5abwlryf>OPERATIVITÀ AERONAUTICA</p><h2 class=\"mt-4 text-balance text-3xl font-semibold tracking-tight text-white sm:text-4xl\" data-astro-cid-5abwlryf>Piloti certificati ENAC e operatività conforme normativa EASA</h2><div class=\"mt-5 text-pretty text-base leading-relaxed text-white/75 sm:text-lg\" data-astro-cid-5abwlryf><p>Le operazioni sono affidate a piloti certificati secondo normativa europea EASA, con abilitazioni riconosciute a livello nazionale e internazionale. Marvin Drone opera nel rispetto delle disposizioni ENAC per il territorio italiano, gestendo direttamente le procedure autorizzative richieste in base allo scenario operativo.</p> </div></div><div class=\"mx-auto mt-10 max-w-5xl sm:mt-12\" data-astro-cid-5abwlryf><p class=\"text-center text-sm font-medium tracking-wide text-white/80\" data-astro-cid-5abwlryf>La pianificazione operativa comprende</p><div class=\"mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 sm:gap-6 lg:grid-cols-4\" data-astro-cid-5abwlryf><div class=\"card-blur-reveal group relative rounded-2xl border border-white/10 bg-white/[0.04] p-5 shadow-sm backdrop-blur transition hover:border-white/20 hover:bg-white/[0.06]\" data-aos=\"fade-up\" data-aos-once=\"true\" style=\"--card-reveal-delay:0ms; --card-reveal-duration:700ms; --card-reveal-blur:14px; --card-reveal-easing:ease-out-cubic;\" data-astro-cid-5abwlryf><div class=\"flex flex-col items-center gap-4 text-center\" data-astro-cid-5abwlryf><div class=\"flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-white/90\" data-astro-cid-5abwlryf><span class=\"h-6 w-6\" data-astro-cid-5abwlryf> <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"> <path d=\"M12 3l8 4v6c0 5-3.5 9-8 9s-8-4-8-9V7l8-4Z\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linejoin=\"round\"/> <path d=\"M12 8v6\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/> <path d=\"M12 17h.01\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"/> </svg> </span></div><div class=\"min-w-0\" data-astro-cid-5abwlryf><h3 class=\"text-sm font-semibold leading-snug text-white\" data-astro-cid-5abwlryf>Valutazione preventiva del