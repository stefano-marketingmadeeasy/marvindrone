\" data-astro-cid-hrlenxk4>Marvin Drone ha operato su produzioni cinematografiche e audiovisive in diverse città italiane e in contesti internazionali, adattando configurazioni operative e pianificazione tecnica alle specificità di ogni location.</div><div data-sezione5-paragraph data-delay=\"640\" data-astro-cid-hrlenxk4>Le riprese sono state realizzate in ambienti urbani, contesti naturali e aree storiche, integrando l’intervento aereo nel piano di produzione e nelle esigenze narrative del progetto.</div><div data-sezione5-paragraph data-delay=\"860\" data-astro-cid-hrlenxk4>Ogni produzione rappresenta un caso operativo concreto, documentato attraverso schede dedicate che descrivono location, tipologia di intervento e configurazioni utilizzate.</div></div></div></div></div></section><script> (() => { const sequences = Array.from( document.querySelectorAll(\"[data-sezione5-sequence]\"), ); if (!sequences.length) return; const reducedMotion = window.matchMedia(\"(prefers-reduced-motion: reduce)\"); const revealSequence = (sequence) => { const paragraphs = Array.from( sequence.querySelectorAll(\"[data-sezione5-paragraph]\"), ); paragraphs.forEach((paragraph) => { const delay = Number.parseInt(paragraph.dataset.delay || \"0\", 10) || 0; window.setTimeout(() => { paragraph.classList.add(\"is-visible\"); }, delay); }); }; if (reducedMotion.matches) { sequences.forEach((sequence) => { sequence .querySelectorAll(\"[data-sezione5-paragraph]\") .forEach((paragraph) => paragraph.classList.add(\"is-visible\")); }); return; } const observer = new IntersectionObserver( (entries) => { entries.forEach((entry) => { if (!entry.isIntersecting) return; revealSequence(entry.target); observer.unobserve(entry.target); }); }, { threshold: 0.2, rootMargin: \"0px 0px -10% 0px\", }, ); sequences.forEach((sequence) => observer.observe(sequence)); })(); </script> <section><div class=\"container\"><div class=\"grid place-items-start gap-12 md:gap-16 lg:grid-cols-1\"><div class=\"mx-auto max-w-5xl text-center\"><div data-aos=\"fade-up-sm\"><span class=\"bg-primary/5 border-secondary text-primary mb-2.5 inline-block rounded-full border px-5 py-px\">FAQ</span><h2 class=\"text-h3 text-inherit\">Domande frequenti sulle riprese aeree con drone</h2></div></div><div data-aos=\"fade-up-sm\" data-aos-delay=\"300\" class=\"w-full mx-auto w-full max-w-5xl\"><div class=\"rounded-lg bg-white p-6\"><div role=\"tabpanel\" class=\"block\" id=\"tab-1\" tabIndex=\"group-1\" aria-labelledby=\"tab-item-1\"> <div class=\"hs-accordion-group divide-y\"> <div class=\"hs-accordion hs-accordion-active:opacity-100 opacity-70 [&#38;:last-of-type_.hs-accordion-content>div]:pt-4 [&#38;:last-of-type_.hs-accordion-toggle]:pb-0 [&#38;:first-of-type_.hs-accordion-toggle]:pt-0 active\" id=\"faq-group-1-1\"> <button aria-expanded=\"true\" class=\"hs-accordion-toggle text-dark flex w-full items-center justify-between py-4 text-start text-lg\" aria-controls=\"faq-content-group-1-1\"> <span>Costo riprese aeree con drone?</span> <span class=\"hs-accordion-active:rotate-180 transition duration-300\"> <div data-lucide=\"ChevronDown\" class=\"text-dark text-xl\"></div> </span> </button> <div role=\"region\" id=\"faq-content-group-1-1\" aria-labelledby=\"faq-group-1-1\" class=\"hs-accordion-content overflow-hidden transition-[height] duration-300\"> <div class=\"prose-styles pb-4\"> <div class=\"rounded-md px-4 py-4 [&>*:first-child]:mt-0 [&>*:last-child]:mb-0\"><p>Il costo delle riprese drone professionali dipende da diversi fattori: complessità della scena, durata delle operazioni, numero di operatori coinvolti, configurazione tecnica richiesta e contesto normativo della location. Ogni produzione richiede una valutazione tecnica specifica. Per questo non esiste un prezzo standard valido per tutti i progetti.</p> </div> </div> </div> </div><div class=\"hs-accordion hs-accordion-active:opacity-100 opacity-70 [&#38;:last-of-type_.hs-accordion-content>div]:pt-4 [&#38;:last-of-type_.hs-accordion-toggle]:pb-0 [&#38;:first-of-type_.hs-accordion-toggle]:pt-0\" id=\"faq-group-1-2\"> <button aria-expanded=\"false\" class=\"hs-accordion-toggle text-dark flex w-full items-center justify-between py-4 text-start text-lg\" aria-controls=\"faq-content-group-1-2\"> <span>Esiste un listino riprese aeree cinematografiche?</span> <span class=\"hs-accordion-active:rotate-180 transition duration-300\"> <div data-lucide=\"ChevronDown\" class=\"text-dark text-xl\"></div> </span> </button> <div role=\"region\" id=\"faq-content-group-1-2\" aria-labelledby=\"faq-group-1-2\" class=\"hs-accordion-content overflow-hidden transition-[height] duration-300 hidden\"> <div class=\"prose-styles pb-4\"> <div class=\"rounded-md px-4 py-4 [&>*:first-child]:mt-0 [&>*:last-child]:mb-0\"><p>No. Le riprese aeree in ambito cinematografico e televisivo sono configurate in base alle esigenze narrative e operative della produzione. Le variabili tecniche e autorizzative rendono necessario un preventivo su misura.</p> </div> </div> </div> </div><div class=\"hs-accordion hs-accordion-active:opacity-100 opacity-70 [&#38;:last-of-type_.hs-accordion-content>div]:pt-4 [&#38;:last-of-type_.hs-accordion-toggle]:pb-0 [&#38;:first-of-type_.hs-accordion-toggle]:pt-0\" id=\"faq-group-1-3\"> <button aria-expanded=\"false\" class=\"hs-accordion-toggle text-dark flex w-full items-center justify-between py-4 text-start text-lg\" aria-controls=\"faq-content-group-1-3\"> <span>È necessario ottenere autorizzazioni per le riprese aeree?</span> <span class=\"hs-accordion-active:rotate-180 transition duration-300\"> <div data-lucide=\"ChevronDown\" class=\"text-dark text-xl\"></div> </span> </button> <div role=\"region\" id=\"faq-content-group-1-3\" aria-labelledby=\"faq-group-1-3\" class=\"hs-accordion-content overflow-hidden transition-[height] duration-300 hidden\"> <div class=\"prose-styles pb-4\"> <div class=\"rounded-md px-4 py-4 [&>*:first-child]:mt-0 [&>*:last-child]:mb-0\"><p>In molti casi sì. Le operazioni devono rispettare la normativa EASA e, in Italia, le disposizioni ENAC. Marvin Drone gestisce direttamente la pianificazione operativa e le eventuali procedure autorizzative richieste in base allo scenario di volo.</p> </div> </div> </div> </div><div class=\"hs-accordion hs-accordion-active:opacity-100 opacity-70 [&#38;:last-of-type_.hs-accordion-content>div]:pt-4 [&#38;:last-of-type_.hs-accordion-toggle]:pb-0 [&#38;:first-of-type_.hs-accordion-toggle]:pt-0\" id=\"faq-group-1-4\"> <button aria-expanded=\"false\" class=\"hs-accordion-toggle text-dark flex w-full items-center justify-between py-4 text-start text-lg\" aria-controls=\"faq-content-group-1-4\"> <span>Operate solo in Sicilia?</span> <span class=\"hs-accordion-active:rotate-180 transition duration-300\"> <div data-lucide=\"ChevronDown\" class=\"text-dark text-xl\"></div> </span> </button> <div role=\"region\" id=\"faq-content-group-1-4\" aria-labelledby=\"faq-group-1-4\" class=\"hs-accordion-content overflow-hidden transition-[height] duration-300 hidden\"> <div class=\"prose-styles pb-4\"> <div class=\"rounded-md px-4 py-4 [&>*:first-child]:mt-0 [&>*:last-child]:mb-0\"><p>No. La base operativa è a Palermo in Sicilia, ma Marvin Drone è attiva su set in tutta Italia e all&#39;estero, adattando l&#39;organizzazione tecnica alle normative locali e alle esigenze produttive.</p> </div> </div> </div> </div><div class=\"hs-accordion hs-accordion-active:opacity-100 opacity-70 [&#38;:last-of-type_.hs-accordion-content>div]:pt-4 [&#38;:last-of-type_.hs-accordion-toggle]:pb-0 [&#38;:first-of-type_.hs-accordion-toggle]:pt-0\" id=\"faq-group-1-5\"> <button aria-expanded=\"false\" class=\"hs-accordion-toggle text-dark flex w-full items-center justify-between py-4 text-start text-lg\" aria-controls=\"faq-content-group-1-5\"> <span>Fornite anche noleggio attrezzatura cinematografica?</span> <span class=\"hs-accordion-active:rotate-180 transition duration-300\"> <div data-lucide=\"ChevronDown\" class=\"text-dark text-xl\"></div> </span> </button> <div role=\"region\" id=\"faq-content-group-1-5\" aria-labelledby=\"faq-group-1-5\" class=\"hs-accordion-content overflow-hidden transition-[height] duration-300 hidden\"> <div class=\"prose-styles pb-4\"> <div class=\"rounded-md px-4 py-4 [&>*:first-child]:mt-0 [&>*:last-child]:mb-0\"><p>Sì. È disponibile il noleggio di attrezzatura cinematografica professionale con possibilità di configurazione tecnica dedicata in funzione del progetto.</p> </div> </div> </div> </div> </div> </div> <script type=\"module\" src=\"/_astro/AccordionList.astro_astro_type_script_index_0_lang.oLWF5yLG.js\"></script></div></div></div></div></section> </main> <footer class=\"relative mt-16 overflow-hidden bg-black text-white\" data-astro-cid-kumwn2iy> <svg width=\"100%\" height=\"100%\" viewBox=\"0 0 333 147\" xml:space=\"preserve\" xmlns:serif=\"http://www.serif.com/\" style=\"fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;\" aria-hidden=\"true\" class=\"pointer-events-none absolute bottom-0 left-1/2 h-[200%] w-[200%] -translate-x-1/2 opacity-10 [&#38;_path]:fill-white\" data-astro-cid-kumwn2iy=\"true\"> <g transform=\"matrix(1,0,0,1,-2.325368,-38.618338)\"> <g> <g> <g transform=\"matrix(0.146311,0,0,0.146311,117.958762,70.518814)\"> <path d=\"M0,564.469L-78.44,480.401L-184.332,368.778L-224.027,416.739L-380.248,606.469L-424.09,658.173L-532.792,491.285L-742.849,711.438C-759.402,728.787 -774.914,743.509 -789.895,761.77C-792.272,753.563 -784.181,753.416 -781.218,747.676C-694.46,633.656 -612.854,517.517 -532.31,398.389L-422.962,537.356L-265.64,326.049L-182.972,213.959L-21.621,383.71L81.856,209.735L329.223,-218.032L498.195,63.47L759.256,481.626L1043.114,248.159L1170.442,404.818L1456.127,748.902C1465.449,760.659 1473.15,770.23 1484.239,779.615C1476.411,782.501 1476.908,774.816 1472.907,770.994L1150.915,463.468L1037.332,356.512L865.241,516.232L739.136,633.551L436.891,171.995L332.698,11.951L235.487,173.399L0,564.469Z\" style=\"fill-rule:nonzero;\" /> 