\"/images/favicons/site.webmanifest\"><meta name=\"msapplication-TileColor\" content=\"#2b5797\"><meta name=\"apple-mobile-web-app-title\" content=\"marvindrone.com\"><!-- JSON-LD --><script type=\"application/ld+json\">{ \"@context\": \"https://schema.org\", \"@type\": [ \"WebPage\", \"FAQPage\" ], \"name\": \"marvindrone.com - Riprese aeree cinematografiche con drone\", \"description\": \"This is a example description\", \"image\": \"https://marvindrone.com/images/og-image.png\", \"url\": \"https://marvindrone.com/\", \"mainEntity\": [ { \"@type\": \"Question\", \"name\": \"Costo riprese aeree con drone?\\n\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Il costo delle riprese drone professionali dipende da diversi fattori: complessità della scena, durata delle operazioni, numero di operatori coinvolti, configurazione tecnica richiesta e contesto normativo della location. Ogni produzione richiede una valutazione tecnica specifica. Per questo non esiste un prezzo standard valido per tutti i progetti.\\n\" } }, { \"@type\": \"Question\", \"name\": \"Esiste un listino riprese aeree cinematografiche?\\n\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"No. Le riprese aeree in ambito cinematografico e televisivo sono configurate in base alle esigenze narrative e operative della produzione. Le variabili tecniche e autorizzative rendono necessario un preventivo su misura.\\n\" } }, { \"@type\": \"Question\", \"name\": \"È necessario ottenere autorizzazioni per le riprese aeree?\\n\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"In molti casi sì. Le operazioni devono rispettare la normativa EASA e, in Italia, le disposizioni ENAC. Marvin Drone gestisce direttamente la pianificazione operativa e le eventuali procedure autorizzative richieste in base allo scenario di volo.\\n\" } }, { \"@type\": \"Question\", \"name\": \"Operate solo in Sicilia?\\n\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"No. La base operativa è a Palermo in Sicilia, ma Marvin Drone è attiva su set in tutta Italia e all'estero, adattando l'organizzazione tecnica alle normative locali e alle esigenze produttive.\\n\" } }, { \"@type\": \"Question\", \"name\": \"Fornite anche noleggio attrezzatura cinematografica?\\n\", \"acceptedAnswer\": { \"@type\": \"Answer\", \"text\": \"Sì. È disponibile il noleggio di attrezzatura cinematografica professionale con possibilità di configurazione tecnica dedicata in funzione del progetto.\\n\" } } ], \"inLanguage\": \"it\", \"isPartOf\": { \"@type\": \"WebSite\", \"name\": \"marvindrone.com - Riprese aeree cinematografiche con drone\", \"description\": \"Riprese aeree cinematografiche con drone\", \"url\": \"https://marvindrone.com/\" }, \"alternateLanguage\": [ { \"@type\": \"WebPage\", \"url\": \"https://marvindrone.com/en/\", \"inLanguage\": \"en\" } ], \"publisher\": { \"@type\": \"Organization\", \"name\": \"marvindrone.com\", \"url\": \"https://marvindrone.com/\", \"sameAs\": [ \"https://www.facebook.com/MarvinDroneTM\", \"https://www.instagram.com/marvindrone_tm\" ], \"logo\": { \"@type\": \"ImageObject\", \"url\": \"https://marvindrone.com/images/logo.svg\" } } }</script><!------------------ Fonts --------------------><link rel=\"stylesheet\" href=\"/_astro/index.Bs44dkrY.css\"> <link rel=\"stylesheet\" href=\"/_astro/plyr.BA1j1_Gc.css\"> <link rel=\"stylesheet\" href=\"/_astro/index.Rn12HPTu.css\"> <style>.production-filter-button[data-astro-cid-sio2ahed][aria-pressed=true]{color:#fff;border-color:#1c1917}.production-filter-button[data-astro-cid-sio2ahed][aria-pressed=false]{color:#57534e;border-color:#d6d3d1}.productions-carousel[data-astro-cid-sio2ahed]{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(82vw,82vw);padding:2.5rem 2rem 4.25rem;scroll-snap-type:x mandatory;scroll-padding-left:0;scrollbar-width:none;-ms-overflow-style:none}.productions-carousel[data-astro-cid-sio2ahed]::-webkit-scrollbar{display:none}.productions-carousel-item[data-astro-cid-sio2ahe