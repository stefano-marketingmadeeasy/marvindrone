- generic [ref=e2]: "{\"data\":[{\"id\":15,\"documentId\":\"ggkhgoclzqc5j5qdahhndmvf\",\"createdAt\":\"2026-04-07T18:11:17.454Z\",\"updatedAt\":\"2026-04-07T18:11:17.454Z\",\"publishedAt\":\"2026-04-07T18:11:17.520Z\",\"locale\":\"it\",\"nome\":\"Le nostre riprese agli Oscar 2024 grazie al maestro Matteo Garrone e \\\"Io Capitano\\\"\",\"slug\":\"le-nostre-riprese-agli-oscar-2024-grazie-al-maestro-matteo-garrone-e-io-capitano\",\"contenuto\":\"Questa sera Oscar…\\n\\nQuesta sera alle 23:30 (ora Italiana) a Los Angeles, presso la academy awards si terranno come ogni anno i premi Oscar, la 96ª Notte dei Premi Oscar, vedrà in tra i candidati il film Italiano “Io Capitano” del maestro Matteo Garrone, per il quale abbiamo realizzato le riprese aeree con i nostri droni e che quindi grazie al maestro saranno viste e giudicate dalla giuria dell'academy, per noi è già un onore immenso, a prescindere da come finirà la serata.\",\"dataPubblicazione\":\"2024-10-10\",\"inEvidenza\":true,\"descrizioneBreve\":\"La 96ª Notte dei Premi Oscar, vedrà in tra i candidati il film Italiano “Io Capitano” del maestro Matteo Garrone, per il quale abbiamo realizzato le riprese aeree\",\"categoria_news\":{\"id\":9,\"documentId\":\"dbvbjx5fq1o9c96jkx8pqekd\",\"nome\":\"News\",\"slug\":\"News\",\"ordine\":0,\"createdAt\":\"2026-04-02T14:05:30.660Z\",\"updatedAt\":\"2026-04-07T09:02:02.838Z\",\"publishedAt\":\"2026-04-07T09:02:02.853Z\",\"locale\":\"it\"},\"immagineCopertina\":{\"id\":55,\"documentId\":\"tl3qkb17tz8395map71btox7\",\"name\":\"io-capitano-agli-oscar.webp\",\"alternativeText\":\"Io capitano foto di scena\",\"caption\":\"Io capitano foto di scena\",\"focalPoint\":null,\"width\":1800,\"height\":1005,\"formats\":{\"large\":{\"ext\":\".webp\",\"url\":\"https://pub-000ddf5c0a6f418b878f06e4a264258d.r2.dev/large_io_capitano_agli_oscar_c59a86e10c.webp\",\"etag\":\"b71bf233251d4593810442a8013e5065\",\"hash\":\"large_io_capitano_agli_oscar_c59a86e10c\",\"mime\":\"image/webp\",\"name\":\"large_io-capitano-agli-oscar.webp\",\"path\":null,\"size\":35.58,\"width\":1000,\"height\":558,\"sizeInBytes\":35578},\"small\":{\"ext\":\".webp\",\"url\":\"https://pub-000ddf5c0a6f418b878f06e4a264258d.r2.dev/small_io_capitano_agli_oscar_c59a86e10c.webp\",\"etag\":\"9bc88bd1551299ffe5b58bcc7bf73ce7\",\"hash\":\"small_io_capitano_agli_oscar_c59a86e10c\",\"mime\":\"image/webp\",\"name\":\"small_io-capitano-agli-oscar.webp\",\"path\":null,\"size\":14.86,\"width\":500,\"height\":279,\"sizeInBytes\":14856},\"medium\":{\"ext\":\".webp\",\"url\":\"https://pub-000ddf5c0a6f418b878f06e4a264258d.r2.dev/medium_io_capitano_agli_oscar_c59a86e10c.webp\",\"etag\":\"80dab3e6d118b0bddc24a7e3c62fe0b4\",\"hash\":\"medium_io_capitano_agli_oscar_c59a86e10c\",\"mime\":\"image/webp\",\"name\":\"medium_io-capitano-agli-oscar.webp\",\"path\":null,\"size\":25.38,\"width\":750,\"height\":419,\"sizeInBytes\":25376},\"thumbnail\":{\"ext\":\".webp\",\"url\":\"https://pub-000ddf5c0a6f418b878f06e4a264258d.r2.dev/thumbnail_io_capitano_agli_oscar_c59a86e10c.webp\",\"etag\":\"cd6ce4798c3d193e7ae30cbec3136f1c\",\"hash\":\"thumbnail_io_capitano_agli_oscar_c59a86e10c\",\"mime\":\"image/webp\",\"name\":\"thumbnail_io-capitano-agli-oscar.webp\",\"path\":null,\"size\":5.68,\"width\":245,\"height\":137,\"sizeInBytes\":5682}},\"hash\":\"io_capitano_agli_oscar_c59a86e10c\",\"ext\":\".webp\",\"mime\":\"image/webp\",\"size\":78.35,\"url\":\"https://pub-000ddf5c0a6f418b878f06e4a264258d.r2.dev/io_capitano_agli_oscar_c59a86e10c.webp\",\"previewUrl\":null,\"provider\":\"aws-s3\",\"provider_metadata\":null,\"createdAt\":\"2026-04-07T08:58:41.678Z\",\"updatedAt\":\"2026-04-07T18:09:56.824Z\",\"publishedAt\":\"2026-04-07T08:58:41.679Z\"},\"galleria\":null,\"seo\":{\"id\":2,\"metaTitle\":\"Le nostre riprese agli Oscar 2024 con il film Io Capitano\",\"metaDescription\":\"La 96ª Notte dei Premi Oscar, vedrà in tra i candidati il film Italiano “Io Capitano”, per il quale abbiamo realizzato le riprese aeree\",\"keywords\":null,\"metaRobots\":null,\"metaViewport\":null,\"canonicalURL\":null,\"structuredData\":null},\"localizations\":[{\"id\":17,\"documentId\":\"ggkhgoclzqc5j5qdahhndmvf\",\"createdAt\":\"2026-04-07T18:12:37.319Z\",\"updatedAt\":\"2026-04-07T18:12:37.319Z\",\"publishedAt\":\"2026-04-07T18:12:37.381Z\",\"locale\":\"en\",\"nome\":\"Our footage at the 2024 Oscars thanks to Matteo Garrone and Io Capitano\",\"slug\":\"our-footage-at-the-2024-oscars-thanks-to-matteo-garrone-and-io-capitano\",\"contenuto\":\"Tonight, the Oscars…\\n\\nTonight at 11:30 PM (Italian time) in Los Angeles, at the Academy Awards, the 96th Oscars will take place as they do every year. Among the nominees is the Italian film Io Capitano by Matteo Garrone, for which we created the aerial footage with our drones.\\n\\nThanks to the maestro, our work will be seen and evaluated by the Academy jury. For us, this is already an immense honor, regardless of how the evening turns out.\",\"dataPubblicazione\":\"2024-10-10\",\"inEvidenza\":true,\"descrizioneBreve\":\"The 96th Academy Awards will feature among the nominees the Italian film Io Capitano by Matteo Garrone, for which we created the aerial footage.\"}]}],\"meta\":{\"pagination\":{\"page\":1,\"pageSize\":1,\"pageCount\":1,\"total\":1}}}"